name: cd

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"
  workflow_run:
    workflows:
      - ci
    types:
      - completed

jobs:
  deploy-and-functional-test:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DATABASE: bbc_news
      CLICKHOUSE_USER: ${{ secrets.CLICKHOUSE_USER }}
      CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
    steps:
      - name: Checkout (workflow_run head)
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout (current ref)
        if: github.event_name != 'workflow_run'
        uses: actions/checkout@v4

      - name: Validate ClickHouse secrets
        run: |
          test -n "$CLICKHOUSE_USER" || { echo "::error::Missing GitHub secret CLICKHOUSE_USER"; exit 1; }
          test -n "$CLICKHOUSE_PASSWORD" || { echo "::error::Missing GitHub secret CLICKHOUSE_PASSWORD"; exit 1; }

      - name: Start container
        run: docker compose up -d --build

      - name: Wait for service
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Run functional scenario
        run: |
          docker compose exec -T bbc-news-api \
            python scripts/run_scenario.py --scenario /app/scenario.json --base-url http://127.0.0.1:8000

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop container
        if: always()
        run: docker compose down
